name: Publish JS

on:
  workflow_call:
    inputs:
      target:
        description: Target
        required: true
        type: string
      solana-cli-version:
        description: Install Solana specified as a major-minor-patch version, e.g. `"2.3.4"`.
        required: true
        type: string
      sbpf-program-packages:
        description: SBPF programs to build and test as a string of space-separated targets, e.g. `package package2`.
        required: false
        type: string
      package-path:
        description: Path to directory with package to release
        required: true
        type: string
      level:
        description: Version level
        required: true
        type: string
      tag:
        description: NPM Tag (and preid for pre-releases)
        required: true
        type: string
      create-release:
        description: Create a GitHub release
        required: true
        type: boolean

jobs:
  test:
    name: Test package
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v7

      - name: Setup Environment
        uses: solana-program/actions/setup-ubuntu@main
        with:
          pnpm: true
          solana: ${{ inputs.solana-cli-version }}
          cache: false

      - name: Format
        env:
          TARGET: ${{ inputs.target }}
        run: make "format-check-js-${TARGET}"

      - name: Lint
        env:
          TARGET: ${{ inputs.target }}
        run: make "lint-js-${TARGET}"

      - name: Build programs
        shell: bash
        env:
          SBPF_PROGRAM_PACKAGES: ${{ inputs.sbpf-program-packages }}
        run: |
          for program in $SBPF_PROGRAM_PACKAGES
          do
            make "build-sbf-${program}"
          done

      - name: Test
        env:
          TARGET: ${{ inputs.target }}
        run: make "test-js-${TARGET}"

      - name: Write check summary
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          TARGET: ${{ inputs.target }}
          BUMP_LEVEL: ${{ inputs.level }}
          NPM_TAG: ${{ inputs.tag }}
          PACKAGE_PATH: ${{ inputs.package-path }}
          CREATE_RELEASE: ${{ inputs.create-release }}
        run: |
          CURRENT_TAG=$(make "git-tag-js-${TARGET}")
          SHORT_SHA=${GH_SHA:0:7}
          {
            echo "## Check summary"
            echo ""
            echo "- **Tag (current):** \`${CURRENT_TAG}\`"
            echo "- **Bump level:** \`${BUMP_LEVEL}\`"
            echo "- **NPM dist-tag:** \`${NPM_TAG}\`"
            echo "- **Package path:** \`${PACKAGE_PATH}\`"
            echo "- **Create release:** \`${CREATE_RELEASE}\`"
            echo "- **Ref:** ${GH_SHA} ([${GH_REPO}@${SHORT_SHA}](https://github.com/${GH_REPO}/commit/${GH_SHA}))"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    environment: prod
    needs: test
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Git Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          fetch-depth: 0 # get the whole history for git-cliff

      - name: Setup Environment
        uses: solana-program/actions/setup-ubuntu@main
        with:
          pnpm: true
          cache: false

      - name: Set Git Author
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf https://github.com/

      - name: Publish
        id: publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
          LEVEL: ${{ inputs.level }}
          TAG: ${{ inputs.tag }}
          TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          echo "old_git_tag=$(make "git-tag-js-${TARGET}")" >> "${GITHUB_OUTPUT}"
          LEVEL="$LEVEL" TAG="$TAG" make "publish-js-${TARGET}"
          echo "new_git_tag=$(make "git-tag-js-${TARGET}")" >> "${GITHUB_OUTPUT}"

      - name: Git Commit Bump, Tag, and Push
        shell: bash
        env:
          NEW_GIT_TAG: ${{ steps.publish.outputs.new_git_tag }}
        run: |
          git commit -am "Publish ${NEW_GIT_TAG}"
          git tag -a "${NEW_GIT_TAG}" -m "Publish ${NEW_GIT_TAG}"
          git push origin --follow-tags

      - name: Generate a changelog
        if: github.event.inputs.create-release == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: "scripts/cliff.toml"
          args: ${{ steps.publish.outputs.old_git_tag }}..HEAD --include-path "${{ inputs.package-path }}/**" --github-repo ${{ github.repository }}
        env:
          OUTPUT: TEMP_CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        if: github.event.inputs.create-release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.publish.outputs.new_git_tag }}
          bodyFile: TEMP_CHANGELOG.md
